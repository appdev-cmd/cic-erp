name: Supabase Daily Backup

on:
  schedule:
    # Chạy vào 17:00 UTC mỗi ngày (tương đương 00:00 sáng giờ Việt Nam)
    - cron: '0 17 * * *'
  # Cho phép kích hoạt chạy bằng tay (Manual trigger) từ tab Actions của GitHub
  workflow_dispatch: 

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client-common postgresql-client

      - name: Get Current Date
        id: date
        run: echo "date=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

      - name: Backup Database to SQL
        env:
          # Đọc chuỗi kết nối từ GitHub Secrets
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Starting database backup..."
          # Kết nối và dump dữ liệu. Dùng gzip nén lại để tiết kiệm dung lượng
          pg_dump "$SUPABASE_DB_URL" --clean --if-exists --no-owner --no-privileges | gzip > backup_cic_erp_${{ steps.date.outputs.date }}.sql.gz
          echo "Backup completed!"
          
      - name: Upload Backup to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ steps.date.outputs.date }}
          path: backup_cic_erp_${{ steps.date.outputs.date }}.sql.gz
          retention-days: 90 # Tự động giữ file trong 90 ngày
